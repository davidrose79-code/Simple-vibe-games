<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Memory Cards — flip and match pairs. Simple Vibe Games." />
  <title>Memory Cards — Simple Vibe Games</title>
  <link rel="stylesheet" href="../../style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 32px 24px 64px;
    }

    .top-nav { width: 100%; max-width: 520px; }

    header {
      text-align: center;
      margin-top: 28px;
    }

    header h1 { font-size: clamp(1.75rem, 6vw, 2.75rem); }

    /* ── Difficulty selector ── */
    .difficulty {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-btn {
      padding: 8px 20px;
      border: 2px solid var(--color-surface);
      border-radius: 980px;
      background: var(--color-surface);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-subtle);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: background-color 200ms ease,
                  border-color 200ms ease,
                  color 200ms ease;
    }

    .diff-btn.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    .diff-btn:active { transform: scale(0.96); }

    @media (hover: hover) {
      .diff-btn:not(.active):hover {
        border-color: var(--color-accent);
        color: var(--color-accent);
      }
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 40px;
      margin-top: 20px;
      justify-content: center;
    }

    .stat-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-subtle);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      color: var(--color-text);
    }

    /* ── Status ── */
    .status {
      margin-top: 16px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-subtle);
      min-height: 1.5em;
      text-align: center;
      transition: color 200ms ease;
    }

    .status.win { color: var(--color-accent); }

    /* ── Card grid ── */
    .grid-wrap { margin-top: 28px; }

    .card-grid {
      display: grid;
      gap: 10px;
      /* columns and width set dynamically by JS */
    }

    /* ── 3-D card flip ── */
    .card {
      aspect-ratio: 1;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      perspective: 600px;
      outline: none;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 380ms ease;
      border-radius: 12px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-cover,
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* Face-down side */
    .card-cover {
      background: var(--color-surface);
      box-shadow: 0 2px 6px var(--color-shadow);
      font-size: 1.4rem;
      color: var(--color-subtle);
    }

    /* Emoji side */
    .card-face {
      background: var(--color-surface);
      box-shadow: 0 2px 6px var(--color-shadow);
      transform: rotateY(180deg);
      /* font-size set dynamically */
    }

    .card.matched .card-face {
      background: #e8f1fb;
      box-shadow: 0 0 0 2px var(--color-accent);
    }

    .card:active:not(.matched) .card-cover {
      transform: scale(0.95);
    }

    @media (hover: hover) {
      .card:not(.matched):not(.flipped):hover .card-cover {
        background-color: #ebebed;
        box-shadow: 0 4px 14px var(--color-shadow-hover);
      }
    }

    /* ── Play again ── */
    .btn-play-again {
      margin-top: 32px;
      padding: 14px 36px;
      background: var(--color-accent);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 980px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: opacity 200ms ease, transform 150ms ease;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .btn-play-again.visible {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .btn-play-again:active { transform: scale(0.97); }

    @media (hover: hover) {
      .btn-play-again:hover { opacity: 0.85; }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="../../index.html" class="back-link" aria-label="Back to all games">All Games</a>
  </nav>

  <header>
    <h1>Memory Cards</h1>
  </header>

  <!-- Difficulty selector -->
  <div class="difficulty" role="group" aria-label="Number of pairs">
    <button class="diff-btn active" data-level="8"  aria-pressed="true">8 Pairs</button>
    <button class="diff-btn"        data-level="12" aria-pressed="false">12 Pairs</button>
    <button class="diff-btn"        data-level="18" aria-pressed="false">18 Pairs</button>
  </div>

  <div class="stats" aria-label="Game stats">
    <div class="stat-block">
      <span class="stat-label">Moves</span>
      <span class="stat-value" id="moves">0</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Pairs</span>
      <span class="stat-value" id="pairs">0 / 8</span>
    </div>
  </div>

  <p class="status" id="status" aria-live="polite" aria-atomic="true">
    Find all the matching pairs!
  </p>

  <div class="grid-wrap">
    <div class="card-grid" id="card-grid" aria-label="Memory card grid"></div>
  </div>

  <button class="btn-play-again" id="btn-play-again" aria-label="Play again">
    Play Again
  </button>

  <script>
    // 18 emojis — easy uses first 8, medium first 12, hard all 18
    const ALL_EMOJIS = [
      '🐶','🐱','🌟','🎈','🍕','🦋','🌈','🐸',
      '🦄','🐼','🍦','🎨',
      '🚀','🎸','🌸','🦁','🐯','🦊'
    ];

    // cols, gridWidth, emoji font-size for each pair count
    const CONFIGS = {
      8:  { cols: 4, width: 'min(340px, 92vw)', fontSize: 'clamp(1.4rem, 5.5vw, 1.9rem)' },
      12: { cols: 4, width: 'min(340px, 92vw)', fontSize: 'clamp(1.2rem, 5vw, 1.7rem)' },
      18: { cols: 6, width: 'min(420px, 96vw)', fontSize: 'clamp(1rem, 4vw, 1.4rem)' },
    };

    let targetPairs = 8;
    let cards   = [];
    let flipped = [];
    let matched = new Set();
    let moves   = 0;
    let locked  = false;

    const gridEl       = document.getElementById('card-grid');
    const movesEl      = document.getElementById('moves');
    const pairsEl      = document.getElementById('pairs');
    const statusEl     = document.getElementById('status');
    const playAgainBtn = document.getElementById('btn-play-again');
    const diffBtns     = document.querySelectorAll('.diff-btn');

    // ── Helpers ────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function cardEl(index) {
      return gridEl.querySelector(`[data-index="${index}"]`);
    }

    // ── Build grid ─────────────────────────────────────────
    function buildGrid() {
      const cfg    = CONFIGS[targetPairs];
      const emojis = ALL_EMOJIS.slice(0, targetPairs);
      cards = shuffle([...emojis, ...emojis]);

      // Apply grid layout
      gridEl.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
      gridEl.style.width = cfg.width;
      gridEl.innerHTML = '';

      cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('aria-label', 'Card, face down');
        card.dataset.index = i;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-cover" aria-hidden="true">?</div>
            <div class="card-face"  aria-hidden="true" style="font-size:${cfg.fontSize}">${emoji}</div>
          </div>`;

        card.addEventListener('click', () => flip(i));
        gridEl.appendChild(card);
      });

      pairsEl.textContent = `0 / ${targetPairs}`;
    }

    // ── Flip logic ─────────────────────────────────────────
    function flip(index) {
      if (locked || matched.has(index) || flipped.includes(index)) return;

      flipped.push(index);
      const el = cardEl(index);
      el.classList.add('flipped');
      el.setAttribute('aria-label', `Card showing ${cards[index]}`);

      if (flipped.length < 2) return;

      moves++;
      movesEl.textContent = moves;
      locked = true;

      const [a, b] = flipped;

      if (cards[a] === cards[b]) {
        matched.add(a);
        matched.add(b);
        cardEl(a).classList.add('matched');
        cardEl(b).classList.add('matched');
        cardEl(a).setAttribute('aria-label', `Matched pair: ${cards[a]}`);
        cardEl(b).setAttribute('aria-label', `Matched pair: ${cards[b]}`);
        flipped = [];
        locked  = false;
        pairsEl.textContent = `${matched.size / 2} / ${targetPairs}`;
        if (matched.size === targetPairs * 2) endGame();
      } else {
        setTimeout(() => {
          cardEl(a).classList.remove('flipped');
          cardEl(b).classList.remove('flipped');
          cardEl(a).setAttribute('aria-label', 'Card, face down');
          cardEl(b).setAttribute('aria-label', 'Card, face down');
          flipped = [];
          locked  = false;
        }, 900);
      }
    }

    // ── End / reset ────────────────────────────────────────
    function endGame() {
      statusEl.textContent = `You did it in ${moves} move${moves === 1 ? '' : 's'}! 🎉`;
      statusEl.className = 'status win';
      playAgainBtn.classList.add('visible');
    }

    function resetGame() {
      flipped  = [];
      matched  = new Set();
      moves    = 0;
      locked   = false;
      movesEl.textContent  = 0;
      statusEl.textContent = 'Find all the matching pairs!';
      statusEl.className   = 'status';
      playAgainBtn.classList.remove('visible');
      buildGrid();
    }

    // ── Difficulty buttons ─────────────────────────────────
    diffBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (parseInt(btn.dataset.level) === targetPairs) return;
        diffBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        targetPairs = parseInt(btn.dataset.level);
        resetGame();
      });
    });

    playAgainBtn.addEventListener('click', resetGame);
    buildGrid();
  </script>

</body>
</html>
