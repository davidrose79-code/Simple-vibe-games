<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Memory Cards — flip and match pairs. Simple Vibe Games." />
  <title>Memory Cards — Simple Vibe Games</title>
  <link rel="stylesheet" href="../../style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 32px 24px 64px;
    }

    .top-nav { width: 100%; max-width: 520px; }

    header {
      text-align: center;
      margin-top: 28px;
    }

    header h1 { font-size: clamp(1.75rem, 6vw, 2.75rem); }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 40px;
      margin-top: 20px;
      justify-content: center;
    }

    .stat-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-subtle);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      color: var(--color-text);
    }

    /* ── Status ── */
    .status {
      margin-top: 16px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-subtle);
      min-height: 1.5em;
      text-align: center;
      transition: color 200ms ease;
    }

    .status.win { color: var(--color-accent); }

    /* ── Card grid ── */
    .grid-wrap { margin-top: 28px; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: min(340px, 92vw);
    }

    /* ── 3-D card flip ── */
    .card {
      aspect-ratio: 1;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      perspective: 600px;
      outline: none;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 380ms ease;
      border-radius: 12px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-cover,
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* Face-down side */
    .card-cover {
      background: var(--color-surface);
      box-shadow: 0 2px 6px var(--color-shadow);
      font-size: 1.4rem;
      color: var(--color-subtle);
    }

    /* Emoji side */
    .card-face {
      background: var(--color-surface);
      box-shadow: 0 2px 6px var(--color-shadow);
      font-size: clamp(1.4rem, 5.5vw, 1.9rem);
      transform: rotateY(180deg);
    }

    .card.matched .card-face {
      background: #e8f1fb;
      box-shadow: 0 0 0 2px var(--color-accent);
    }

    /* Press feedback */
    .card:active:not(.matched) .card-cover {
      transform: scale(0.95);
    }

    @media (hover: hover) {
      .card:not(.matched):not(.flipped):hover .card-cover {
        background-color: #ebebed;
        box-shadow: 0 4px 14px var(--color-shadow-hover);
      }
    }

    /* ── Play again ── */
    .btn-play-again {
      margin-top: 32px;
      padding: 14px 36px;
      background: var(--color-accent);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 980px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: opacity 200ms ease, transform 150ms ease;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .btn-play-again.visible {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .btn-play-again:active { transform: scale(0.97); }

    @media (hover: hover) {
      .btn-play-again:hover { opacity: 0.85; }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="../../index.html" class="back-link" aria-label="Back to all games">All Games</a>
  </nav>

  <header>
    <h1>Memory Cards</h1>
  </header>

  <div class="stats" aria-label="Game stats">
    <div class="stat-block">
      <span class="stat-label">Moves</span>
      <span class="stat-value" id="moves">0</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Pairs</span>
      <span class="stat-value" id="pairs">0 / 8</span>
    </div>
  </div>

  <p class="status" id="status" aria-live="polite" aria-atomic="true">
    Find all the matching pairs!
  </p>

  <div class="grid-wrap">
    <div class="card-grid" id="card-grid" aria-label="Memory card grid"></div>
  </div>

  <button class="btn-play-again" id="btn-play-again" aria-label="Play again">
    Play Again
  </button>

  <script>
    const EMOJIS = ['🐶','🐱','🌟','🎈','🍕','🦋','🌈','🐸'];

    let cards    = [];   // shuffled array of emojis (16 items)
    let flipped  = [];   // indices of currently face-up (unmatched) cards
    let matched  = new Set();
    let moves    = 0;
    let locked   = false; // true while checking a non-matching pair

    const gridEl      = document.getElementById('card-grid');
    const movesEl     = document.getElementById('moves');
    const pairsEl     = document.getElementById('pairs');
    const statusEl    = document.getElementById('status');
    const playAgainBtn = document.getElementById('btn-play-again');

    // ── Helpers ────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function cardEl(index) {
      return gridEl.querySelector(`[data-index="${index}"]`);
    }

    // ── Build grid ─────────────────────────────────────────
    function buildGrid() {
      cards = shuffle([...EMOJIS, ...EMOJIS]);
      gridEl.innerHTML = '';

      cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('aria-label', 'Card, face down');
        card.dataset.index = i;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-cover" aria-hidden="true">?</div>
            <div class="card-face"  aria-hidden="true">${emoji}</div>
          </div>`;

        card.addEventListener('click', () => flip(i));
        gridEl.appendChild(card);
      });
    }

    // ── Flip logic ─────────────────────────────────────────
    function flip(index) {
      if (locked || matched.has(index) || flipped.includes(index)) return;

      flipped.push(index);
      const el = cardEl(index);
      el.classList.add('flipped');
      el.setAttribute('aria-label', `Card showing ${cards[index]}`);

      if (flipped.length < 2) return;

      // Two cards face up — check for match
      moves++;
      movesEl.textContent = moves;
      locked = true;

      const [a, b] = flipped;

      if (cards[a] === cards[b]) {
        // Match
        matched.add(a);
        matched.add(b);
        cardEl(a).classList.add('matched');
        cardEl(b).classList.add('matched');
        cardEl(a).setAttribute('aria-label', `Matched pair: ${cards[a]}`);
        cardEl(b).setAttribute('aria-label', `Matched pair: ${cards[b]}`);
        flipped = [];
        locked  = false;
        pairsEl.textContent = `${matched.size / 2} / 8`;
        if (matched.size === 16) endGame();
      } else {
        // No match — flip back after a short pause
        setTimeout(() => {
          cardEl(a).classList.remove('flipped');
          cardEl(b).classList.remove('flipped');
          cardEl(a).setAttribute('aria-label', 'Card, face down');
          cardEl(b).setAttribute('aria-label', 'Card, face down');
          flipped = [];
          locked  = false;
        }, 900);
      }
    }

    // ── End / reset ────────────────────────────────────────
    function endGame() {
      statusEl.textContent = `You did it in ${moves} move${moves === 1 ? '' : 's'}! 🎉`;
      statusEl.className = 'status win';
      playAgainBtn.classList.add('visible');
    }

    function resetGame() {
      flipped  = [];
      matched  = new Set();
      moves    = 0;
      locked   = false;
      movesEl.textContent  = 0;
      pairsEl.textContent  = '0 / 8';
      statusEl.textContent = 'Find all the matching pairs!';
      statusEl.className   = 'status';
      playAgainBtn.classList.remove('visible');
      buildGrid();
    }

    playAgainBtn.addEventListener('click', resetGame);
    buildGrid();
  </script>

</body>
</html>
