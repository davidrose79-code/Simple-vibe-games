<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Word Search — find the hidden words. Simple Vibe Games." />
  <title>Word Search — Simple Vibe Games</title>
  <link rel="stylesheet" href="../../style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 32px 24px 64px;
    }

    .top-nav { width: 100%; max-width: 520px; }

    header {
      text-align: center;
      margin-top: 28px;
    }

    header h1 { font-size: clamp(1.75rem, 6vw, 2.75rem); }

    /* ── Difficulty selector ── */
    .difficulty {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-btn {
      padding: 8px 20px;
      border: 2px solid var(--color-surface);
      border-radius: 980px;
      background: var(--color-surface);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-subtle);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: background-color 200ms ease,
                  border-color 200ms ease,
                  color 200ms ease;
    }

    .diff-btn.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    .diff-btn:active { transform: scale(0.96); }

    @media (hover: hover) {
      .diff-btn:not(.active):hover {
        border-color: var(--color-accent);
        color: var(--color-accent);
      }
    }

    /* ── Status ── */
    .status {
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-subtle);
      min-height: 1.5em;
      text-align: center;
      transition: color 200ms ease;
    }

    .status.win { color: var(--color-accent); }

    /* ── Letter grid ── */
    .grid-wrap {
      margin-top: 24px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .letter-grid {
      display: grid;
      gap: 3px;
      /* grid-template-columns and width set by JS */
    }

    .cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      border-radius: 6px;
      background: var(--color-surface);
      color: var(--color-text);
      transition: background-color 150ms ease, color 150ms ease;
      /* font-size set dynamically */
    }

    .cell.selecting {
      background: #cce0f8;
      color: var(--color-accent);
    }

    .cell.found {
      background: var(--color-accent);
      color: #fff;
    }

    /* ── Word list ── */
    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      justify-content: center;
      margin-top: 24px;
      /* max-width set dynamically to match grid */
    }

    .word-item {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: 0.05em;
      transition: color 200ms ease;
    }

    .word-item.found {
      color: var(--color-accent);
      text-decoration: line-through;
      text-decoration-color: var(--color-accent);
    }

    /* ── Play again ── */
    .btn-play-again {
      margin-top: 32px;
      padding: 14px 36px;
      background: var(--color-accent);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 980px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: opacity 200ms ease, transform 150ms ease;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .btn-play-again.visible {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .btn-play-again:active { transform: scale(0.97); }

    @media (hover: hover) {
      .btn-play-again:hover { opacity: 0.85; }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="../../index.html" class="back-link" aria-label="Back to all games">All Games</a>
  </nav>

  <header>
    <h1>Word Search</h1>
  </header>

  <!-- Difficulty selector -->
  <div class="difficulty" role="group" aria-label="Word length">
    <button class="diff-btn active" data-level="short" aria-pressed="true">Short</button>
    <button class="diff-btn"        data-level="long"  aria-pressed="false">Long</button>
    <button class="diff-btn"        data-level="mixed" aria-pressed="false">Mixed</button>
  </div>

  <p class="status" id="status" aria-live="polite" aria-atomic="true">
    Swipe to find all the words!
  </p>

  <div class="grid-wrap" id="grid-wrap">
    <div class="letter-grid" id="letter-grid" aria-label="Word search grid"></div>
  </div>

  <div class="word-list" id="word-list" aria-label="Words to find"></div>

  <button class="btn-play-again" id="btn-play-again" aria-label="Play again">
    Play Again
  </button>

  <script>
    // ── Word sets ───────────────────────────────────────────
    const WORD_SETS = {
      // 8 short words, 3 letters each → 8×8 grid
      short: {
        words: ['CAT', 'DOG', 'SUN', 'HAT', 'BEE', 'FLY', 'RED', 'MAP'],
        gridSize: 8,
      },
      // 8 long words, 5–6 letters → 10×10 grid
      long: {
        words: ['TIGER', 'APPLE', 'CLOUD', 'STONE', 'BREAD', 'LEMON', 'RIVER', 'MUSIC'],
        gridSize: 10,
      },
      // 10 words, mixed 3–5 letters → 12×12 grid
      mixed: {
        words: ['CAT', 'FROG', 'TIGER', 'SUN', 'APPLE', 'STAR', 'HAT', 'BEAR', 'STONE', 'CAKE'],
        gridSize: 12,
      },
    };

    const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const DIRECTIONS = [
      [0,  1],  // right
      [0, -1],  // left
      [1,  0],  // down
      [-1, 0],  // up
    ];

    // ── State ───────────────────────────────────────────────
    let currentLevel = 'short';
    let grid         = [];
    let placements   = [];
    let foundWords   = new Set();
    let dragStart    = null;
    let dragCells    = [];

    // ── DOM refs ────────────────────────────────────────────
    const gridEl       = document.getElementById('letter-grid');
    const wordListEl   = document.getElementById('word-list');
    const statusEl     = document.getElementById('status');
    const playAgainBtn = document.getElementById('btn-play-again');
    const gridWrapEl   = document.getElementById('grid-wrap');
    const diffBtns     = document.querySelectorAll('.diff-btn');

    // ── Puzzle generation ───────────────────────────────────
    function generatePuzzle() {
      const { words, gridSize } = WORD_SETS[currentLevel];
      grid       = Array.from({length: gridSize}, () => Array(gridSize).fill(''));
      placements = [];

      for (const word of words) {
        let placed   = false;
        let attempts = 0;

        while (!placed && attempts < 400) {
          attempts++;
          const [dr, dc] = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];

          const rMin = dr === -1 ? word.length - 1 : 0;
          const rMax = dr ===  1 ? gridSize - word.length : gridSize - 1;
          const cMin = dc === -1 ? word.length - 1 : 0;
          const cMax = dc ===  1 ? gridSize - word.length : gridSize - 1;

          if (rMin > rMax || cMin > cMax) continue;

          const r0 = rMin + Math.floor(Math.random() * (rMax - rMin + 1));
          const c0 = cMin + Math.floor(Math.random() * (cMax - cMin + 1));

          const cells = word.split('').map((letter, i) => ({
            r: r0 + dr * i,
            c: c0 + dc * i,
            letter,
          }));

          if (cells.every(({r, c, letter}) => grid[r][c] === '' || grid[r][c] === letter)) {
            cells.forEach(({r, c, letter}) => { grid[r][c] = letter; });
            placements.push({ word, cells: cells.map(({r, c}) => ({r, c})) });
            placed = true;
          }
        }
      }

      // Fill remaining cells
      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          if (grid[r][c] === '') {
            grid[r][c] = ALPHA[Math.floor(Math.random() * ALPHA.length)];
          }
        }
      }
    }

    // ── Render ──────────────────────────────────────────────
    function applyGridLayout() {
      const { gridSize } = WORD_SETS[currentLevel];
      // Grid fills up to 96vw, capped so cells stay large enough
      const maxPx    = Math.min(window.innerWidth * 0.96, 400);
      const cellPx   = Math.floor(maxPx / gridSize);
      const gridPx   = cellPx * gridSize;
      const fontSize = Math.max(10, Math.min(18, Math.floor(cellPx * 0.45)));

      gridEl.style.gridTemplateColumns = `repeat(${gridSize}, ${cellPx}px)`;
      gridEl.style.width = `${gridPx}px`;
      wordListEl.style.maxWidth = `${gridPx}px`;

      // Apply font size to all cells
      gridEl.querySelectorAll('.cell').forEach(c => {
        c.style.fontSize = `${fontSize}px`;
      });
    }

    function renderGrid() {
      const { gridSize } = WORD_SETS[currentLevel];
      gridEl.innerHTML = '';

      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.textContent = grid[r][c];
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.setAttribute('aria-label', `Letter ${grid[r][c]}`);
          gridEl.appendChild(cell);
        }
      }

      applyGridLayout();
    }

    function renderWordList() {
      const { words } = WORD_SETS[currentLevel];
      wordListEl.innerHTML = '';
      words.forEach(word => {
        const span = document.createElement('span');
        span.className = 'word-item';
        span.id = `word-${word}`;
        span.textContent = word;
        span.setAttribute('aria-label', word);
        wordListEl.appendChild(span);
      });
    }

    function getCellEl(r, c) {
      return gridEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    }

    // ── Touch selection ─────────────────────────────────────
    function cellFromPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      if (!el || !el.classList.contains('cell')) return null;
      return { r: parseInt(el.dataset.r), c: parseInt(el.dataset.c) };
    }

    function cellsBetween(r1, c1, r2, c2) {
      if (r1 === r2) {
        const step = c2 >= c1 ? 1 : -1;
        const out  = [];
        for (let c = c1; c !== c2 + step; c += step) out.push({r: r1, c});
        return out;
      }
      if (c1 === c2) {
        const step = r2 >= r1 ? 1 : -1;
        const out  = [];
        for (let r = r1; r !== r2 + step; r += step) out.push({r, c: c1});
        return out;
      }
      return [{r: r1, c: c1}];
    }

    function applySelecting(cells) {
      dragCells.forEach(({r, c}) => {
        const el = getCellEl(r, c);
        if (el && !el.classList.contains('found')) el.classList.remove('selecting');
      });
      dragCells = cells;
      dragCells.forEach(({r, c}) => {
        const el = getCellEl(r, c);
        if (el && !el.classList.contains('found')) el.classList.add('selecting');
      });
    }

    function clearSelecting() {
      dragCells.forEach(({r, c}) => {
        const el = getCellEl(r, c);
        if (el) el.classList.remove('selecting');
      });
      dragCells = [];
    }

    function checkSelection(cells) {
      const { words } = WORD_SETS[currentLevel];
      const word    = cells.map(({r, c}) => grid[r][c]).join('');
      const wordRev = word.split('').reverse().join('');
      const match   = words.find(w => (w === word || w === wordRev) && !foundWords.has(w));
      if (!match) return;

      foundWords.add(match);
      cells.forEach(({r, c}) => {
        const el = getCellEl(r, c);
        if (el) { el.classList.remove('selecting'); el.classList.add('found'); }
      });
      const wordEl = document.getElementById(`word-${match}`);
      if (wordEl) wordEl.classList.add('found');

      const remaining = words.length - foundWords.size;
      if (remaining === 0) {
        endGame();
      } else {
        statusEl.textContent = `${remaining} word${remaining === 1 ? '' : 's'} left!`;
      }
    }

    // ── Touch events ────────────────────────────────────────
    gridWrapEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const cell  = cellFromPoint(touch.clientX, touch.clientY);
      if (!cell) return;
      dragStart = cell;
      applySelecting([cell]);
    }, {passive: false});

    gridWrapEl.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!dragStart) return;
      const touch = e.touches[0];
      const cell  = cellFromPoint(touch.clientX, touch.clientY);
      if (!cell) return;
      applySelecting(cellsBetween(dragStart.r, dragStart.c, cell.r, cell.c));
    }, {passive: false});

    gridWrapEl.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (!dragStart || dragCells.length === 0) { dragStart = null; return; }
      checkSelection([...dragCells]);
      clearSelecting();
      dragStart = null;
    }, {passive: false});

    // ── End / reset ─────────────────────────────────────────
    function endGame() {
      statusEl.textContent = 'You found them all! 🎉';
      statusEl.className   = 'status win';
      playAgainBtn.classList.add('visible');
    }

    function resetGame() {
      foundWords = new Set();
      dragStart  = null;
      dragCells  = [];
      statusEl.textContent = 'Swipe to find all the words!';
      statusEl.className   = 'status';
      playAgainBtn.classList.remove('visible');
      generatePuzzle();
      renderGrid();
      renderWordList();
    }

    // ── Difficulty buttons ──────────────────────────────────
    diffBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.level === currentLevel) return;
        diffBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        currentLevel = btn.dataset.level;
        resetGame();
      });
    });

    // Re-apply layout on window resize so the grid stays proportional
    window.addEventListener('resize', applyGridLayout);

    playAgainBtn.addEventListener('click', resetGame);

    // ── Init ────────────────────────────────────────────────
    generatePuzzle();
    renderGrid();
    renderWordList();
  </script>

</body>
</html>
